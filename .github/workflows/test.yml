name: Run Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install autotest dependencies
        run: npm ci
        working-directory: autotests

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('autotests/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: autotests

      - name: Create .env file
        run: echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" > .env

      - name: Run agent pipeline
        run: |
          mkdir -p results
          npm run dev 2>&1 | tee results/pipeline_output.txt
        continue-on-error: true

      - name: Ensure results directories exist
        if: always()
        run: |
          mkdir -p results
          mkdir -p autotests/allure-results
          mkdir -p autotests/test-results
          mkdir -p autotests/src
          mkdir -p autotests/pages

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: autotests/allure-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            autotests/test-results/
            results/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload pipeline results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results
          path: results/
          retention-days: 30
          if-no-files-found: ignore
